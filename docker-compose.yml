version: '3.8'

services:
  iris:
    build: .
    container_name: iris_analytics
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      # Mount the local data directory to persist the SQLite database
      - ./data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/iris.db
      - DASHBOARD_DIR=/app/dashboard/dist
      # Example production lockdown:
      # - IRIS_ALLOWED_INGEST_ORIGINS=https://algomind.pro,https://www.algomind.pro,https://sahirashifal.com,https://www.sahirashifal.com
      # - IRIS_ALLOWED_DASHBOARD_ORIGINS=https://analytics.algomind.pro
